<html> 
    <head>
        <title>Document</title>
    </head> 
    <body style="background-color: papayawhip;">
        <h1 style="color: royalblue;">Basic Arithmetic Calculator</h1> <br> 
      <style>
        button{
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: 30px;
            padding: 30px;
        }
    </style>
    <script>
        function plus()
        {
            var a=parseInt(document.getElementById("n1").value);
            var b=parseInt(document.getElementById("n2").value);
            var r=a+b;
            document.getElementById("result").value=r;
        }
        function minus()
        {
            var a=parseInt(document.getElementById("n1").value);
            var b=parseInt(document.getElementById("n2").value);
            var r=a-b;
            document.getElementById("result").value=r;
        }
        function multiply()
        {
            var a=parseInt(document.getElementById("n1").value);
            var b=parseInt(document.getElementById("n2").value);
            var r=a*b;
            document.getElementById("result").value=r;
        }
        function divide()
        {
            var a=parseInt(document.getElementById("n1").value);
            var b=parseInt(document.getElementById("n2").value);
            var r=a/b;
            document.getElementById("result").value=r;
        }
    </script>
        <style>
            #calcu{width:300px;height:250px;}
            #button{width:100%;height:40px;font-size:20px;}
         </style> 
        <form Name="calcu"> 
            <table id="calcu" style="border: black; border: double;">
                <tr>
                    <td colspan="4">
                        <input id="button" name="display" onkeypress="return event.charCode >= 48 && event.charCode <= 57" type="text">
                    </td>
                </tr>
                <tr> 
                    <td>
                        <input id="button" type=button value="1" OnClick="calcu.display.value+='1'">
                    </td> 
                    <td>
                        <input id="button" type=button value="2" OnClick="calcu.display.value+='2'">
                    </td> 
                    <td>
                        <input id="button" type=button value="3" OnClick="calcu.display.value+='3'">
                    </td> 
                    <td>
                        <input id="button" type=button value="4" OnClick="calcu.display.value+='4'">
                    </td> 
                </tr> 
                <tr> 
                    <td>
                        <input id="button" type=button value="5" OnClick="calcu.display.value+='5'">
                    </td> 
                    <td>
                        <input id="button" type=button value="6" OnClick="calcu.display.value+='6'">
                    </td> 
                    <td>
                        <input id="button" type=button value="7" OnClick="calcu.display.value+='7'">
                    </td> 
                    <td>
                        <input id="button" type=button value="8" OnClick="calcu.display.value+='8'">
                    </td> 
                </tr> 
                <tr> 
                    <td>
                        <input id="button" type=button value="9" OnClick="calcu.display.value+='9'">
                    </td> 
                    <td>
                        <input id="button" type=button value="0" OnClick="calcu.display.value+='0'">
                    </td> 
                    <td>
                        <input id="button" type=button value="=" OnClick="calcu.display.value=eval(calcu.display.value)">
                    </td> 
                    <td>
                        <input id="button" type=button value="C" OnClick="calcu.display.value=''">
                    </td> 
                </tr> 
                <tr>
                    <td>
                        <input id="button" type=button value="+" OnClick="calcu.display.value+='+'">
                    </td>
                    <td>
                        <input id="button" type=button value="-" OnClick="calcu.display.value+='-'">
                    </td> 
                    <td>
                        <input id="button" type=button value="*" OnClick="calcu.display.value+='*'">
                    </td> 
                    <td>
                        <input id="button" type=button value="/" OnClick="calcu.display.value+='/'">
                    </td> 
              </tr>
            </table> 
        </form> 
      <h1 style="font-family: Verdana, Geneva, Tahoma, sans-serif; color: cadetblue;">Basic Calculator</h1>
      <label for="n1">Enter first number</label>
      <input type="number" id="n1"> <br><br>
      <label for="n2">Enter second number</label>
      <input type="number" id="n2"> <br><br>
      <label for="result">Result: </label>
      <input type="number" id="result" disabled> <br><br>
      <button onclick="plus()">+</button>
      <button onclick="minus()">-</button>
      <button onclick="multiply()">*</button>
      <button onclick="divide()">/</button>
      </body> 
    </html>
